name: Cous Cous
ingredients:
- cous cous
- paprika
- tomato concentrate
- beans
- feta cheese
procedure:
- soak cous cous in luke warm water.
- heat up a little oil and add tomato concentrate to it. Add a little water to avoid
  the concentrate from burning.
- add diced paprika and cook till the paprika softens. Add coriander powder and red
  chilli powder and saute for a few seconds.
- add beans to it and a little water to create more gravy and let it cook for a while.
- add cous cous and turn off the heat.
- Garnish with feta cheese.
category: easy_meals
