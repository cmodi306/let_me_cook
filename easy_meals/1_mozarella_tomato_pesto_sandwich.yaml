Name: Mozarella Tomato Pesto Sandwich

Ingredients:
  - Tomatoes
  - Ciabatta/Baguette
  - Pesto
  - Mozarella
  - Balsamico Sauce
  - Rucola

Procedure:
  - Slice open the bread. Toasting it is optional.
  - Spread pesto and put some rucola on it.
  - Add tomato slices and mozarella on top of it.
  - Add a little of balsamico on top.
  - Finish it with some more of rucola.
  