name: Egg Baguette Sandwich
ingredients:
- eggs
- baguette
- chilli mayo
- tomatoes
procedure:
- add oil to pan to heat it up and crack a pair of eggs in bowl.
- 'add garam masala and coriander powder if needed and salt to taste. Whisk and add
  to the pan. (Tip: add 2 spoons of milk to make it soft).'
- slice open the baguette and put the inside edges on the omlette. After it is cooked,
  flip it to toast the outer side of the baguette.
- drizzle chilli mayo in the sandwich and add thin slices of tomatoes.
- enjoy.
category: easy_meals
