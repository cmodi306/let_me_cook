Name: Lehsuni Palak Paneer/Tofu

Ingredients:
  - Dreid whole red chilli
  - Garlic bulb
  - Onions (optional)
  - Jeera
  - Spinach
  - Tomatoes

Procedure:
  - Soak the tofu cubes into hot water and leave it aside.
  - Blanch the spinach and blend it to make a paste.
  - Cut the garlic into thin slices.
  - In a pan, heat some oil. Add 1 or 2 dry whole red chillies, jeera and the garlic. If you have chopped onions, add them too along with them.
  - Add the spinach paste, tofu cubes and tomatoes. Let everything simmer for long time (15-20 min).
  - If needed, add a little water for consistency.
  - Add tadka of garlic and chilli if needed.
